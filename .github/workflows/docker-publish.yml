name: Docker publish

on:
  workflow_dispatch:
  schedule:
    - cron: "45 0 * * *"
  push:
    branches:
      - "**"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/**"

env:
  IS_MAIN: ${{ github.event.repository.default_branch == github.ref_name }}
  DOTNET_VERSION: 10

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        project:
          # - TraderEngine.API
          - TraderEngine.CLI
    env:
      DOCKER_HOST: tcp://git.dind:2375
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: ${{ github.sha }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.CR_REGISTRY }}/${{ matrix.project }}
          tags: |
            type=ref,event=branch
            type=raw,enable=true,value=nightly
      - name: Setup dotnet
        if: steps.meta.outputs.tags != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Dotnet publish
        if: steps.meta.outputs.tags != ''
        run: |
          dotnet publish "${{ matrix.project }}/${{ matrix.project }}.csproj" -c Release /p:UseAppHost=false
      - name: Install Docker CLI
        if: steps.meta.outputs.tags != ''
        run: apt-get update -qq && apt-get install -y -qq docker.io
      - name: Set up QEMU
        if: steps.meta.outputs.tags != ''
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        id: buildx
        if: steps.meta.outputs.tags != ''
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
          driver-opts: network=host
      - name: Login to container registry
        if: steps.meta.outputs.tags != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.CR_REGISTRY }}/bvandevliet
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}
      - name: Build and publish
        if: steps.meta.outputs.tags != ''
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.project }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ steps.buildx.outputs.platforms }}
          push: true
