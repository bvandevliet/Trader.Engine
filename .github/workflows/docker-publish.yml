name: Docker publish

on:
  workflow_dispatch:
  schedule:
    - cron: "45 0 * * *"
  push:
    branches:
      - "**"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/**"

env:
  IS_MAIN: ${{ github.event.repository.default_branch == github.ref_name }}
  DOTNET_VERSION: 10

jobs:
  gitversion:
    name: Execute GitVersion and create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      preReleaseLabel: ${{ steps.gitversion.outputs.preReleaseLabel }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
    steps:
      - name: Unshallow checkout
        uses: actions/checkout@main
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x.x"
      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          configFilePath: .github/GitVersion.yml
      - name: Create Git tag
        if: github.event.repository.default_branch == github.ref_name
        continue-on-error: true
        run: |
          git tag v${{ steps.gitversion.outputs.majorMinorPatch }}
          git push origin v${{ steps.gitversion.outputs.majorMinorPatch }}
  build-push:
    needs: [gitversion]
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        project:
          - TraderEngine.API
          - TraderEngine.CLI
    env:
      DOCKER_HOST: tcp://git.dind:2375
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: ${{ github.sha }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.CR_REGISTRY }}/${{ matrix.project }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.gitversion.outputs.semVer }}
            type=semver,enable=${{ env.IS_MAIN == 'true' }},pattern={{major}}.{{minor}},value=${{ needs.gitversion.outputs.semVer }}
            type=semver,enable=${{ env.IS_MAIN == 'true' }},pattern={{major}},value=${{ needs.gitversion.outputs.semVer }}
            type=ref,event=branch
            type=raw,enable=${{ env.IS_MAIN == 'false' }},value=${{ needs.gitversion.outputs.preReleaseLabel }}
            type=raw,enable=${{ env.IS_MAIN == 'true' }},value=nightly
            type=schedule,pattern=nightly
      - name: Setup dotnet
        if: steps.meta.outputs.tags != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10
      - name: Dotnet publish
        if: steps.meta.outputs.tags != ''
        run: |
          dotnet publish "${{ matrix.project }}/${{ matrix.project }}.csproj" \
            -c Release /p:UseAppHost=false \
            /p:Version=${{ needs.gitversion.outputs.semVer }} \
            /p:AssemblyVersion=${{ needs.gitversion.outputs.assemblySemVer }} \
            /p:FileVersion=${{ needs.gitversion.outputs.assemblySemFileVer }}
      - name: Install Docker CLI
        if: steps.meta.outputs.tags != ''
        run: apt-get update -qq && apt-get install -y -qq docker.io
      - name: Set up QEMU
        if: steps.meta.outputs.tags != ''
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        id: buildx
        if: steps.meta.outputs.tags != ''
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
          driver-opts: network=host
      - name: Login to container registry
        if: steps.meta.outputs.tags != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.CR_REGISTRY }}/bvandevliet
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}
      - name: Build and publish
        if: steps.meta.outputs.tags != ''
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.project }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ steps.buildx.outputs.platforms }}
          push: true
